<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Details — Ghar ki Samrat</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <nav class="navbar nav-scrolled" id="navbar">
    <div class="nav-container">
      <a href="/home" class="logo"><div class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><span class="logo-text">Ghar ki Samrat</span></a>
      <ul class="nav-links">
        <li><a href="/home" class="nav-link">Home</a></li>
        <li><a href="/home#properties" class="nav-link">Properties</a></li>
        <li><a href="/sell.html" class="nav-link">Sell Property</a></li>
        <li><a href="/cart.html" class="nav-link">Cart</a></li>
      </ul>
      <div class="nav-auth" id="auth-buttons">
        <a href="/cart.html" class="nav-cart-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span class="cart-count" style="display:none;">0</span></a>
        <button class="btn-login" onclick="window.location.href='/'">Log In</button>
      </div>
      <div class="user-menu" id="user-menu">
        <a href="/cart.html" class="nav-cart-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span class="cart-count" style="display:none;">0</span></a>
        <span class="user-name" style="font-weight:600;margin-right:16px;">User</span>
        <a href="/dashboard.html" style="font-weight:600;color:var(--primary);text-decoration:none;margin-right:16px;">My Profile</a>
        <button class="btn-logout" data-action="logout">Logout</button>
      </div>
    </div>
  </nav>
  <button class="btn-back-floating" onclick="window.history.back()" aria-label="Go Back" title="Go Back">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
  </button>
  <main class="property-detail-page" id="property-detail">
    <div class="detail-loading">
      <div class="spinner"></div>
      <p>Loading property details...</p>
    </div>
  </main>
  <footer class="footer">
    <div class="footer-bottom">
      <p>&copy; 2026 Ghar ki Samrat. All rights reserved.</p>
    </div>
  </footer>
  <script src="/auth.js"></script>
  <script src="/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.init();
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const source = params.get('source');
      if (!id) { window.location.href = '/'; return; }
      try {
        const res = await fetch(`/property/${id}`);
        if (!res.ok) throw new Error('Not found');
        const prop = await res.json();
        renderPropertyDetail(prop);
      } catch (err) {
        // For AI-generated properties, try to get from session storage
        if (source === 'ai') {
          try {
            const aiProps = JSON.parse(sessionStorage.getItem('aiProperties') || '[]');
            const aiProp = aiProps.find(p => p.id === id);
            if (aiProp) {
              renderPropertyDetail(aiProp);
              return;
            }
          } catch(e) { console.error('Failed to parse AI props cache', e); }
          document.getElementById('property-detail').innerHTML = `
            <div style="text-align:center;padding:120px 24px;">
              <h2 style="font-size:24px;font-weight:700;margin-bottom:12px;">AI-Generated Listing</h2>
              <p style="color:var(--text-gray);margin-bottom:12px;">This property was dynamically generated. Add it to your cart first to save it.</p>
              <a href="/" class="btn-signup" style="text-decoration:none;display:inline-block;">Browse Properties</a>
            </div>`;
        } else {
          document.getElementById('property-detail').innerHTML = `
            <div style="text-align:center;padding:120px 24px;">
              <h2 style="font-size:24px;font-weight:700;margin-bottom:12px;">Property Not Found</h2>
              <p style="color:var(--text-gray);margin-bottom:24px;">The property you're looking for doesn't exist or has been removed.</p>
              <a href="/" class="btn-signup" style="text-decoration:none;display:inline-block;">Back to Home</a>
            </div>`;
        }
      }
    });
    function renderPropertyDetail(prop) {
      const container = document.getElementById('property-detail');
      const cleanPhone = prop.phone?.replace(/[\s+]/g, '') || '919876543210';
      const whatsappMsg = encodeURIComponent(`Hi! I'm interested in "${prop.title}" listed on Ghar ki Samrat. Please share more details.`);
      container.innerHTML = `
        <div class="detail-hero">
          <img src="${prop.image}" alt="${prop.title}" onerror="this.src='https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=1200&h=600&fit=crop'" />
          <div class="detail-hero-overlay">
            <span class="property-tag">${prop.tag}</span>
          </div>
        </div>
        <div class="detail-container">
          <div class="detail-main">
            <div class="detail-breadcrumb">
              <a href="/home">Home</a> / <a href="/home#properties">Properties</a> / <span>${prop.title}</span>
            </div>
            <h1 class="detail-title">${prop.title}</h1>
            <div class="detail-location">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              ${prop.location}
            </div>
            <div class="detail-price">${formatINR(prop.price)}</div>
            <div class="detail-specs-grid">
              ${prop.type ? `<div class="detail-spec"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>${prop.type}</span></div>` : ''}
              ${prop.bedrooms ? `<div class="detail-spec"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v11m0-4h18m0 4V8a3 3 0 0 0-3-3H6a3 3 0 0 0-3 3"/></svg><span>${prop.bedrooms} Bedrooms</span></div>` : ''}
              ${prop.bathrooms ? `<div class="detail-spec"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h16a1 1 0 0 1 1 1v3a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4v-3a1 1 0 0 1 1-1z"/></svg><span>${prop.bathrooms} Bathrooms</span></div>` : ''}
              ${prop.area ? `<div class="detail-spec"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg><span>${prop.area} sq.ft</span></div>` : ''}
            </div>
            <div class="detail-section">
              <h2>About this Property</h2>
              <p>${prop.description || 'No description available.'}</p>
            </div>
            <div class="detail-section">
              <h2>Investment Details</h2>
              <div class="detail-invest-grid">
                <div class="invest-item"><span class="invest-label">Expected Yield</span><span class="invest-value">${prop.yield || 'N/A'}</span></div>
                <div class="invest-item"><span class="invest-label">Funded</span><span class="invest-value">${prop.funded || 0}%</span></div>
                <div class="invest-item"><span class="invest-label">Investors</span><span class="invest-value">${prop.investors || 0}</span></div>
                <div class="invest-item"><span class="invest-label">Listed On</span><span class="invest-value">${new Date(prop.createdAt).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'})}</span></div>
              </div>
            </div>
          </div>
          <div class="detail-sidebar">
            <div class="sidebar-card">
              <h3>Contact Seller</h3>
              <p class="sidebar-phone">${prop.phone || '+91 98765 43210'}</p>
              <a href="tel:${prop.phone}" class="btn-call">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
                 Call Seller
              </a>
              <a href="https://wa.me/${cleanPhone}?text=${whatsappMsg}" target="_blank" class="btn-whatsapp">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                WhatsApp Seller
              </a>
              <button class="btn-add-cart-detail" onclick="addToCart('${prop.id}')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                Add to Cart
              </button>
            </div>
          </div>
        </div>`;
    }
  </script>
</body>
</html>
