<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — Ghar ki Samrat</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👤</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <nav class="navbar nav-scrolled" id="navbar">
    <div class="nav-container">
      <a href="/home" class="logo"><div class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><span class="logo-text">Ghar ki Samrat</span></a>
      <ul class="nav-links">
        <li><a href="/home" class="nav-link">Home</a></li>
        <li><a href="/home#properties" class="nav-link">Properties</a></li>
        <li><a href="/sell.html" class="nav-link">Sell Property</a></li>
        <li><a href="/cart.html" class="nav-link">Cart</a></li>
      </ul>
      <div class="nav-auth" id="auth-buttons">
        <button class="btn-login" onclick="window.location.href='/'">Log In</button>
      </div>
      <div class="user-menu" id="user-menu">
        <a href="/cart.html" class="nav-cart-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span class="cart-count" style="display:none;">0</span></a>
        <span class="user-name" style="font-weight:600;margin-right:16px;">User</span>
        <a href="/dashboard.html" style="font-weight:600;color:var(--primary);text-decoration:none;margin-right:16px;">My Profile</a>
        <button class="btn-logout" data-action="logout">Logout</button>
      </div>
    </div>
  </nav>
  <main class="dashboard-page">
    <div class="dashboard-container">
      <div class="dashboard-header">
        <h1>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          My Profile
        </h1>
      </div>
      <div class="dashboard-content" id="dashboard-content">
        <div style="text-align:center;padding:60px 0;color:#9ca3af;">
          <div class="spinner"></div>
          <p style="margin-top:12px;">Loading profile...</p>
        </div>
      </div>
    </div>
  </main>
  <footer class="footer"><div class="footer-bottom"><p>&copy; 2026 Ghar ki Samrat. All rights reserved.</p></div></footer>
  <script src="/auth.js"></script>
  <script src="/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.init();
      loadProfile();
    });
    function loadProfile() {
      const container = document.getElementById('dashboard-content');
      const user = Auth.checkAuth();
      if (!user) {
        container.innerHTML = `
          <div class="cart-empty">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <h3>Please log in to view your profile</h3>
            <p>Sign in to manage your account details and properties.</p>
            <a href="/" class="btn-signup" style="text-decoration:none;display:inline-block;margin-top:16px;">Go to Log In</a>
          </div>`;
        return;
      }
      container.innerHTML = `
        <div class="dashboard-card">
          <div class="profile-avatar">
            ${user.name.charAt(0).toUpperCase()}
          </div>
          <div class="profile-info">
            <h2>${user.name}</h2>
            <p>ID: ${user.id}</p>
            <div class="profile-detail">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              <span>+91 ${user.mobile}</span>
            </div>
            <div style="margin-top:24px;display:flex;gap:12px;">
              <a href="/sell.html" class="btn-signup" style="text-decoration:none;display:inline-flex;align-items:center;gap:8px;padding:12px 20px;">
                Sell a Property
              </a>
              <a href="/cart.html" class="btn-login" style="text-decoration:none;display:inline-flex;align-items:center;gap:8px;padding:12px 20px;">
                View Cart
              </a>
            </div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
